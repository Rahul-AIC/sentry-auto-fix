# ─────────────────────────────────────────────────────────────────────
# CI/CD for Flutter app — runs on all PRs, with pipeline status
# reported back for auto-fix branches.
#
# Place this file at: bitbucket-pipelines.yml in your FLUTTER REPO.
# ─────────────────────────────────────────────────────────────────────

image: ghcr.io/cirruslabs/flutter:3.24.0

pipelines:
  pull-requests:
    '**':
      - step:
          name: Analyze & Test
          caches:
            - flutter
          script:
            - flutter pub get
            - dart format --set-exit-if-changed .
            - flutter analyze --fatal-infos
            - flutter test --coverage
          artifacts:
            - coverage/lcov.info

  branches:
    main:
      - step:
          name: Analyze & Test
          caches:
            - flutter
          script:
            - flutter pub get
            - dart format --set-exit-if-changed .
            - flutter analyze --fatal-infos
            - flutter test --coverage
      - step:
          name: Build
          script:
            - flutter build apk --release
          artifacts:
            - build/app/outputs/flutter-apk/app-release.apk
      # ── Add your deployment steps here ──
      # Examples:
      # - Firebase App Distribution
      # - Google Play Console (using fastlane)
      # - TestFlight (using fastlane)

definitions:
  caches:
    flutter: /sdks/flutter
